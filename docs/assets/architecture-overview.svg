<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Debate Architecture Overview</title>
  <desc id="desc">Parent orchestrator routes messages between pro, con, and judge agent processes, with memory and logs.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f4f4f"/>
    </marker>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font: 700 30px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 16px Arial, sans-serif; fill: #52616b; }
      .box { fill: #ffffff; stroke: #bcccdc; stroke-width: 2; rx: 10; }
      .agent { fill: #e8f4ff; stroke: #4098d7; stroke-width: 2; rx: 10; }
      .parent { fill: #fff7e6; stroke: #d97706; stroke-width: 2; rx: 10; }
      .store { fill: #eefcf3; stroke: #2f855a; stroke-width: 2; rx: 10; }
      .label { font: 700 17px Arial, sans-serif; fill: #102a43; }
      .small { font: 14px Arial, sans-serif; fill: #334e68; }
      .line { stroke: #2f4f4f; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="560"/>
  <text class="title" x="55" y="55">AI Agent Debate: Process and IPC Architecture</text>
  <text class="subtitle" x="55" y="84">Three agent roles run through a parent-controlled multiprocessing design.</text>

  <rect class="box" x="55" y="210" width="150" height="80"/>
  <text class="label" x="88" y="242">Terminal CLI</text>
  <text class="small" x="82" y="266">topic + menu</text>

  <rect class="parent" x="295" y="180" width="230" height="140"/>
  <text class="label" x="330" y="220">Parent Process</text>
  <text class="small" x="328" y="248">DebateOrchestrator</text>
  <text class="small" x="328" y="272">routing, memory, cleanup</text>

  <rect class="agent" x="650" y="95" width="190" height="90"/>
  <text class="label" x="692" y="130">pro-agent</text>
  <text class="small" x="689" y="156">DebateAgent</text>

  <rect class="agent" x="650" y="235" width="190" height="90"/>
  <text class="label" x="688" y="270">con-agent</text>
  <text class="small" x="689" y="296">DebateAgent</text>

  <rect class="agent" x="650" y="375" width="190" height="90"/>
  <text class="label" x="684" y="410">judge-agent</text>
  <text class="small" x="700" y="436">JudgeAgent</text>

  <rect class="store" x="955" y="145" width="185" height="90"/>
  <text class="label" x="1004" y="180">Memory</text>
  <text class="small" x="986" y="206">compact summary</text>

  <rect class="store" x="955" y="305" width="185" height="90"/>
  <text class="label" x="1016" y="340">Logs</text>
  <text class="small" x="986" y="366">JSONL + transcript</text>

  <path class="line" d="M205 250 C240 250, 255 250, 295 250"/>
  <path class="line" d="M525 225 C570 170, 595 140, 650 140"/>
  <path class="line" d="M525 265 C575 270, 600 280, 650 280"/>
  <path class="line" d="M525 300 C575 365, 600 420, 650 420"/>
  <path class="line" d="M840 140 C900 145, 900 170, 955 190"/>
  <path class="line" d="M840 280 C905 285, 910 330, 955 350"/>
  <path class="line" d="M525 245 C715 245, 790 245, 955 190"/>
  <path class="line" d="M525 275 C715 275, 790 320, 955 350"/>

  <text class="small" x="565" y="68">Queues carry JSON-ready messages; agents never talk directly to each other.</text>
</svg>
